name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Install Docker Compose
      run: |
        sudo curl -L "https://github.com/docker/compose/releases/download/1.29.2/docker-compose-$(uname -s)-$(uname -m)" -o /usr/local/bin/docker-compose
        sudo chmod +x /usr/local/bin/docker-compose

    - name: Login to DockerHub
      uses: docker/login-action@v1
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and push Docker images
      run: |
        docker-compose build
        docker-compose push

    - name: Deploy to CentOS 7 server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          # Create symlink for docker-compose if it doesn't exist
          sudo ln -sf /usr/local/bin/docker-compose /usr/bin/docker-compose
          cd /path/to/your/project
          git pull origin main
          sudo /usr/local/bin/docker-compose pull
          sudo /usr/local/bin/docker-compose up -d
          sudo firewall-cmd --permanent --add-port=8080/tcp
          sudo firewall-cmd --reload
          # CentOS 7 specific commands
          sudo systemctl restart docker
          # If you're using SELinux, you might need to run:
          # sudo chcon -Rt svirt_sandbox_file_t /path/to/your/project

