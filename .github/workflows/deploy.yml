name: Deploy to Production

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2

    - name: Login to DockerHub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Deploy to CentOS 7 server
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd Xproject/EMOtestapp/video-player-app
          git fetch --all
          git reset --hard origin/master
          if [ -f docker-compose.yml ]; then
            docker-compose build
            docker-compose push
            docker-compose pull
            docker-compose up -d
          else
            echo "docker-compose.yml not found in the current directory"
            exit 1
          fi
          if [ -f /etc/sudoers.d/github-actions ]; then
            sudo -n firewall-cmd --permanent --add-port=8080/tcp
            sudo -n firewall-cmd --reload
            sudo -n systemctl restart docker
          else
            echo "Sudo permissions not set up for non-interactive use"
          fi

